<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#08080B" />
<title>Poker Coach — образовательный тренажёр</title>

<!--
  ============================================================================
  POKER COACH  ·  Telegram Mini App прототип  ·  один самодостаточный файл
  Образовательный покерный тренажёр. БЕЗ игры на деньги. НЕ казино.
  ----------------------------------------------------------------------------
  ТОЧКИ ИНТЕГРАЦИИ (на будущее):
  [TG]  Telegram WebApp SDK    — скрипт ниже + блок init в JS (раздел 1)
  [API] Backend                — функции с пометкой // BACKEND: ...
  [AI]  AI-анализ раздач        — analyzeDecision(): см. // AI: ...
  [SUB] Подписка / оплата       — экран scrSub(): // SUB: ...
  [GEO] Геолокация + карта клубов — scrMap(): // GEO/MAPS: ...
  ============================================================================
-->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Яндекс.Карты подгружаются динамически при открытии вкладки «Клубы» (см. loadYandex) -->
<style>
:root{
  --bg:#08080B; --bg2:#0E0E13; --surface:rgba(255,255,255,.055); --surface2:rgba(255,255,255,.09);
  --stroke:rgba(255,255,255,.10); --stroke2:rgba(255,255,255,.16);
  --text:#F4F4F7; --muted:#8C8C97; --dim:#5C5C66;
  --red:#FF3B43; --red2:#D62828; --redglow:rgba(255,59,67,.45);
  --grad-red:linear-gradient(135deg,#FF5257 0%,#D11E22 100%);
  --grad-card:linear-gradient(160deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
  --radius:24px; --shadow:0 18px 50px rgba(0,0,0,.55);
  --fdisp:"Bricolage Grotesque",system-ui,sans-serif;
  --fbody:"Manrope",system-ui,-apple-system,sans-serif; --max:480px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--fbody);color:var(--text);min-height:100vh;min-height:100dvh;
  background:var(--bg);display:flex;justify-content:center;align-items:stretch;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
#app{
  width:100%;max-width:var(--max);min-height:100vh;min-height:100dvh;position:relative;
  display:flex;flex-direction:column;overflow:hidden;background:var(--bg);
  background-image:
    radial-gradient(120% 70% at 80% -10%,rgba(255,59,67,.20),transparent 60%),
    radial-gradient(120% 60% at -10% 8%,rgba(255,59,67,.10),transparent 55%),
    radial-gradient(90% 50% at 50% 110%,rgba(120,120,160,.10),transparent 60%);
}
#app::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:radial-gradient(rgba(255,255,255,.045) 1px,transparent 1px);
  background-size:3px 3px;mix-blend-mode:overlay;
}
@media(min-width:520px){
  body{padding:20px 0;align-items:center;background:radial-gradient(circle at 50% 30%,#15151c,#070709);}
  #app{height:min(940px,calc(100dvh - 40px));min-height:auto;border-radius:40px;border:1px solid var(--stroke);box-shadow:var(--shadow);}
}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:18px 16px 30px;position:relative;z-index:1;}
.scroll.with-nav{padding-bottom:108px;}

/* type */
h1,h2,h3{font-family:var(--fdisp);margin:0;line-height:1.02;letter-spacing:-.02em;font-weight:800;}
h1{font-size:32px;} h2{font-size:22px;} h3{font-size:18px;}
.eyebrow{font-family:var(--fdisp);font-weight:700;letter-spacing:.18em;text-transform:uppercase;font-size:10.5px;color:var(--red);}
.muted{color:var(--muted);} p{line-height:1.55;margin:0;color:var(--text);}
.big-num{font-family:var(--fdisp);font-weight:800;}
.hr{height:1px;background:var(--stroke);margin:14px 0;border:none;} .sp{height:13px;} .center{text-align:center;}

/* buttons */
.btn{font-family:var(--fdisp);font-weight:700;font-size:16px;border:none;border-radius:16px;padding:16px 18px;width:100%;
  cursor:pointer;transition:transform .14s cubic-bezier(.2,.9,.3,1.3),box-shadow .2s,background .2s,opacity .2s;
  display:inline-flex;align-items:center;justify-content:center;gap:9px;color:var(--text);position:relative;overflow:hidden;}
.btn:active{transform:scale(.96);}
.btn-red{background:var(--grad-red);color:#fff;box-shadow:0 10px 30px var(--redglow);}
.btn-red::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-18deg);animation:sheen 3.6s ease-in-out infinite;}
@keyframes sheen{0%,60%{left:-60%}80%,100%{left:130%}}
.btn-red:disabled{background:#26262d;box-shadow:none;color:var(--dim);cursor:not-allowed;}
.btn-red:disabled::after{display:none;}
.btn-black{background:var(--surface2);color:#fff;border:1px solid var(--stroke2);backdrop-filter:blur(8px);}
.btn-ghost{background:transparent;color:#fff;border:1px solid var(--stroke2);}
.btn-soft{background:var(--surface);color:#fff;border:1px solid var(--stroke);font-size:14px;padding:13px 14px;backdrop-filter:blur(8px);}
.btn-sm{width:auto;font-size:13px;padding:11px 15px;border-radius:13px;box-shadow:none;}
.row{display:flex;gap:9px;} .row>.btn{flex:1;} .wrap{flex-wrap:wrap;}
body.in-tg .cta-primary{display:none;}

/* glass panels */
.panel{background:var(--grad-card);border:1px solid var(--stroke);border-radius:var(--radius);padding:18px;backdrop-filter:blur(14px);box-shadow:0 10px 30px rgba(0,0,0,.35);}
.panel.soft{background:var(--surface);}
.tile{background:var(--surface);border:1px solid var(--stroke);border-radius:18px;padding:15px;backdrop-filter:blur(10px);transition:transform .14s;}
.tile:active{transform:scale(.99);}

/* topbar */
.topbar{display:flex;align-items:center;gap:11px;padding:2px 0 10px;}
.topbar .back{width:42px;height:42px;border-radius:14px;border:1px solid var(--stroke2);background:var(--surface);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;backdrop-filter:blur(10px);transition:transform .14s;}
.topbar .back:active{transform:scale(.9);}
.topbar h2{flex:1;font-size:20px;}

/* floating nav */
.bottomnav{position:absolute;left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));height:66px;
  background:rgba(20,20,26,.72);backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px);
  border:1px solid var(--stroke2);border-radius:24px;display:flex;padding:7px;z-index:40;box-shadow:0 14px 40px rgba(0,0,0,.55);}
.bottomnav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  color:var(--dim);font-family:var(--fbody);font-weight:700;font-size:10px;cursor:pointer;border-radius:18px;transition:.2s;}
.bottomnav button .ic{font-size:19px;line-height:1;transition:.2s;}
.bottomnav button.active{color:#fff;background:var(--surface2);}
.bottomnav button.active .ic{color:var(--red);transform:translateY(-1px);text-shadow:0 0 14px var(--redglow);}

/* stats */
.stats{display:flex;gap:8px;} .stats.s4>div{flex:1;}
.stat{flex:1;background:var(--surface);border:1px solid var(--stroke);border-radius:18px;padding:13px 9px;text-align:center;backdrop-filter:blur(10px);}
.stat .v{font-family:var(--fdisp);font-weight:800;font-size:21px;line-height:1;color:#fff;}
.stat .l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
.stat.red{background:var(--grad-red);border:none;box-shadow:0 10px 26px var(--redglow);} .stat.red .l{color:#ffffffcc;}
.stat.ghost{background:transparent;border:1px solid var(--stroke2);} 

/* progress */
.bar{height:10px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.bar>i{display:block;height:100%;background:var(--grad-red);border-radius:99px;width:0;transition:width .9s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 14px var(--redglow);}
.bar.black>i{background:linear-gradient(90deg,#fff,#bdbdc7);box-shadow:none;} .bar.thin{height:6px;}

/* hero balance card (Revolut-like) */
.hero-card{position:relative;border-radius:26px;padding:22px;overflow:hidden;border:1px solid var(--stroke2);
  background:linear-gradient(150deg,#1a1a22,#0d0d11);box-shadow:var(--shadow);}
.hero-card::before{content:"";position:absolute;width:320px;height:320px;border-radius:50%;top:-160px;right:-120px;
  background:radial-gradient(circle,rgba(255,59,67,.55),transparent 65%);filter:blur(8px);animation:floaty 7s ease-in-out infinite;}
@keyframes floaty{0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,16px)}}
.hero-card .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);position:relative;}
.hero-card .val{font-family:var(--fdisp);font-weight:800;font-size:46px;line-height:1;margin-top:8px;position:relative;}

/* felt + cards */
.felt{background:radial-gradient(circle at 50% 22%,#23121a 0,#0a0608 76%);border-radius:24px;padding:18px 14px;color:#fff;position:relative;
  border:1px solid rgba(255,59,67,.22);box-shadow:inset 0 0 40px rgba(255,59,67,.06),0 16px 38px rgba(0,0,0,.5);overflow:hidden;}
.felt .seatlabel{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#ffffff70;text-align:center;}
.cardrow{display:flex;justify-content:center;gap:6px;min-height:78px;align-items:center;flex-wrap:wrap;perspective:900px;}
.cardrow.sm{min-height:60px;}
.pcard{width:52px;height:74px;background:linear-gradient(160deg,#fff,#eceaf0);border-radius:9px;border:1px solid #00000022;position:relative;flex:0 0 auto;
  font-family:var(--fdisp);font-weight:800;box-shadow:0 6px 14px rgba(0,0,0,.45);user-select:none;}
.pcard .r{position:absolute;top:4px;left:6px;font-size:16px;line-height:1;}
.pcard .s{position:absolute;bottom:3px;right:5px;font-size:18px;line-height:1;}
.pcard .c{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:25px;}
.pcard.sm{width:40px;height:57px;} .pcard.sm .r{font-size:12px;}.pcard.sm .s{font-size:14px;}.pcard.sm .c{font-size:19px;}
.pcard.xs{width:30px;height:43px;border-radius:6px;}.pcard.xs .r{font-size:10px;top:2px;left:3px;}.pcard.xs .s{display:none;}.pcard.xs .c{font-size:14px;}
.pcard.red{color:var(--red2);} .pcard.black{color:#15151a;}
.pcard.deal{animation:dealCard .42s both cubic-bezier(.2,.85,.25,1);}
@keyframes dealCard{from{transform:translateY(46px) rotateX(40deg) scale(.8);opacity:0}to{transform:none;opacity:1}}
.pcard.sel{outline:3px solid var(--red);outline-offset:2px;transform:translateY(-6px);box-shadow:0 10px 24px var(--redglow);}
.pcard.danger{outline:3px solid var(--red);outline-offset:1px;animation:pulseDanger 1s ease infinite;}
@keyframes pulseDanger{0%,100%{outline-color:var(--red);box-shadow:0 0 0 0 var(--redglow)}50%{outline-color:#ff9498;box-shadow:0 0 22px var(--redglow)}}
.pcard.out{outline:3px solid #fff;outline-offset:1px;box-shadow:0 0 0 6px rgba(255,255,255,.18);}
.pcard.dim{opacity:.22;filter:grayscale(1);}
.pcard.tap{cursor:pointer;transition:transform .12s;} .pcard.tap:active{transform:scale(.92);}
.empty-slot{width:52px;height:74px;border-radius:9px;border:1.5px dashed #ffffff44;background:#ffffff0d;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#ffffff55;font-size:22px;}
.empty-slot.active{border-color:var(--red);color:var(--red);background:rgba(255,59,67,.14);}

/* chips */
.chiparea{display:flex;justify-content:center;align-items:flex-end;gap:5px;min-height:40px;}
.chip{width:30px;height:30px;border-radius:50%;border:3px dashed #ffffffcc;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:800;flex:0 0 auto;box-shadow:0 3px 8px rgba(0,0,0,.5);}
.chip.r{background:var(--grad-red);} .chip.b{background:#1b1b22;border-color:#ffffff55;} .chip.w{background:#fff;color:#15151a;border:3px dashed var(--red);}
.chip.fly{position:fixed;z-index:120;pointer-events:none;}
.potbox{text-align:center;margin:6px 0;}
.potbox .lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#ffffff80;}
.potbox .amt{font-family:var(--fdisp);font-weight:800;font-size:26px;color:#fff;}
.stacks{display:flex;justify-content:space-between;font-size:11px;color:#ffffffcc;margin-top:4px;}

/* betting */
.betgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.betbtn{border:1px solid var(--stroke2);background:var(--surface);border-radius:16px;padding:15px 6px;font-family:var(--fdisp);font-weight:700;font-size:14px;cursor:pointer;transition:.14s;text-align:center;color:#fff;backdrop-filter:blur(8px);}
.betbtn:active{transform:scale(.95);} .betbtn.on{background:var(--grad-red);border-color:transparent;color:#fff;box-shadow:0 8px 22px var(--redglow);}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;}
.preset{border:1px solid var(--stroke2);border-radius:99px;padding:8px 13px;font-weight:700;font-size:13px;cursor:pointer;background:var(--surface);color:#fff;}
.preset.on{background:#fff;color:#15151a;border-color:#fff;}
.betsize{font-family:var(--fdisp);font-weight:800;font-size:40px;text-align:center;line-height:1;color:#fff;}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:99px;background:rgba(255,255,255,.12);outline:none;margin:14px 0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--grad-red);border:4px solid #14141a;box-shadow:0 4px 14px var(--redglow);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:30px;height:30px;border-radius:50%;background:var(--red);border:4px solid #14141a;cursor:pointer;}

/* coach */
.coach{display:flex;gap:11px;align-items:flex-start;}
.bubble{background:var(--surface);border:1px solid var(--stroke2);border-radius:16px;padding:12px 14px;position:relative;font-size:14px;line-height:1.5;flex:1;backdrop-filter:blur(10px);color:var(--text);}
.bubble:before{content:"";position:absolute;top:15px;left:-8px;width:13px;height:13px;background:var(--surface);border-left:1px solid var(--stroke2);border-bottom:1px solid var(--stroke2);transform:rotate(45deg);}
.coach.glad svg{animation:nod .6s ease;} @keyframes nod{0%,100%{transform:none}30%{transform:translateY(-5px) rotate(-5deg)}60%{transform:rotate(4deg)}}

/* feedback */
.fb{border-radius:18px;padding:16px;margin-top:13px;border:1px solid;animation:fbin .35s cubic-bezier(.2,1.3,.4,1);}
@keyframes fbin{from{transform:scale(.96) translateY(8px);opacity:0}to{transform:none;opacity:1}}
.fb.ok{background:rgba(255,255,255,.05);border-color:var(--stroke2);} .fb.bad{background:rgba(255,59,67,.10);border-color:rgba(255,59,67,.4);}
.fb .ttl{font-family:var(--fdisp);font-weight:800;font-size:17px;display:flex;align-items:center;gap:8px;color:#fff;}
.fb.bad .ttl{color:var(--red);}
.xp{display:inline-block;background:#fff;color:#15151a;font-weight:800;font-family:var(--fdisp);padding:6px 14px;border-radius:99px;margin-top:8px;}
.evloss{display:inline-block;background:var(--grad-red);color:#fff;font-weight:800;font-family:var(--fdisp);padding:6px 14px;border-radius:99px;margin-top:8px;}
.pulseCorrect{animation:pulseCorrect .55s ease;} @keyframes pulseCorrect{0%{box-shadow:0 0 0 0 var(--redglow)}100%{box-shadow:0 0 0 18px rgba(255,59,67,0)}}
.shakeWrong{animation:shakeWrong .4s;} @keyframes shakeWrong{0%,100%{transform:none}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* verdict */
.vblock{border-left:2px solid var(--red);padding:2px 0 2px 12px;margin:12px 0;}
.vblock .k{font-family:var(--fdisp);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--red);}
.vblock .v{margin-top:3px;font-size:14.5px;line-height:1.5;color:var(--text);}
.mathrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--stroke);font-size:14px;color:var(--text);}
.mathrow b{font-family:var(--fdisp);color:#fff;}

/* options */
.opt{display:flex;align-items:center;gap:12px;border:1px solid var(--stroke);background:var(--surface);border-radius:16px;padding:14px;cursor:pointer;transition:.16s;font-weight:700;margin-bottom:9px;color:#fff;backdrop-filter:blur(8px);}
.opt:active{transform:scale(.98);} .opt.on{border-color:var(--red);background:rgba(255,59,67,.12);box-shadow:0 8px 24px rgba(255,59,67,.18);}
.opt .ic{font-size:21px;} .opt small{display:block;color:var(--muted);font-weight:500;font-size:12px;margin-top:2px;}
.opt .chk{margin-inline-start:auto;width:24px;height:24px;border-radius:50%;border:1px solid var(--stroke2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;}
.opt.on .chk{background:var(--grad-red);border-color:transparent;}

/* grid + navcards */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.navcard{background:var(--surface);border:1px solid var(--stroke);border-radius:20px;padding:15px;cursor:pointer;transition:transform .16s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden;backdrop-filter:blur(10px);animation:rise .5s both;}
.navcard:active{transform:scale(.96);} .navcard:hover{border-color:var(--stroke2);}
.navcard .ic{font-size:22px;} .navcard .t{font-family:var(--fdisp);font-weight:700;font-size:15px;margin-top:9px;color:#fff;} .navcard .d{font-size:11px;color:var(--muted);margin-top:2px;}
.navcard.big{grid-column:span 2;background:var(--grad-red);border:none;box-shadow:0 16px 40px var(--redglow);} .navcard.big .d{color:#ffffffd0;} .navcard.big .t{font-size:19px;}
.navcard.big::after{content:"";position:absolute;width:200px;height:200px;border-radius:50%;right:-60px;bottom:-90px;background:rgba(255,255,255,.14);}
.navcard.dark{background:linear-gradient(160deg,#16161d,#0c0c10);}
.grid .navcard:nth-child(1){animation-delay:.02s}.grid .navcard:nth-child(2){animation-delay:.06s}.grid .navcard:nth-child(3){animation-delay:.1s}.grid .navcard:nth-child(4){animation-delay:.14s}.grid .navcard:nth-child(5){animation-delay:.18s}.grid .navcard:nth-child(6){animation-delay:.22s}.grid .navcard:nth-child(7){animation-delay:.26s}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* tags / pills */
.chiprow{display:flex;flex-wrap:wrap;gap:7px;}
.tag{border:1px solid var(--stroke2);background:var(--surface);border-radius:99px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;transition:.14s;color:#fff;}
.tag:active{transform:scale(.95);} .tag.on{background:#fff;color:#15151a;border-color:#fff;} .tag.good{background:var(--grad-red);border-color:transparent;color:#fff;} .tag.wrongpick{background:rgba(255,59,67,.12);border-color:var(--red);color:var(--red);}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);color:#fff;border:1px solid var(--stroke);border-radius:99px;padding:6px 12px;font-weight:700;font-size:12px;font-family:var(--fdisp);} .pill.red{background:var(--grad-red);border:none;box-shadow:0 6px 16px var(--redglow);} .pill.ghost{background:transparent;border:1px solid var(--stroke2);}

/* timeline */
.timeline{display:flex;gap:6px;margin:12px 0;}
.tl-step{flex:1;text-align:center;padding:10px 4px;border-radius:13px;border:1px solid var(--stroke);font-family:var(--fdisp);font-weight:700;font-size:12px;cursor:pointer;background:var(--surface);color:#fff;transition:.14s;}
.tl-step.on{background:var(--grad-red);border-color:transparent;box-shadow:0 8px 20px var(--redglow);} .tl-step.done{border-color:var(--stroke2);}

/* meter */
.meter{height:14px;border-radius:99px;background:linear-gradient(90deg,#2a2a33,var(--red));position:relative;overflow:hidden;}
.meter>i{position:absolute;top:0;right:0;bottom:0;background:rgba(255,255,255,.10);width:100%;transition:width .9s cubic-bezier(.2,.8,.2,1);}

/* matrix */
.matrix{display:grid;grid-template-columns:repeat(13,1fr);gap:2px;}
.rcell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;font-family:var(--fdisp);cursor:pointer;background:rgba(255,255,255,.05);color:#9a9aa6;border:1px solid transparent;transition:.08s;user-select:none;}
.rcell.fold{background:rgba(255,255,255,.04);color:#55555f;} .rcell.open{background:var(--grad-red);color:#fff;} .rcell.premium{background:#fff;color:#15151a;} .rcell.mixed{background:transparent;border:1px solid var(--red);color:var(--red);}
.rcell.on{outline:2px solid #fff;outline-offset:-2px;} .rcell.hit{background:#fff;color:#15151a;} .rcell.miss{background:transparent;border:1px dashed var(--red);}
.mlegend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;margin-top:10px;color:var(--muted);}
.mlegend span{display:inline-flex;align-items:center;gap:5px;} .mlegend i{width:13px;height:13px;border-radius:4px;display:inline-block;}

/* blog */
.article{border:1px solid var(--stroke);border-radius:20px;padding:0;margin-bottom:13px;cursor:pointer;transition:transform .16s,border-color .2s;background:var(--surface);overflow:hidden;backdrop-filter:blur(10px);animation:rise .5s both;}
.article:active{transform:scale(.98);} .article:hover{border-color:var(--stroke2);}
.article .cover{height:96px;position:relative;display:flex;align-items:flex-end;padding:14px;background:linear-gradient(150deg,#1c1c25,#0d0d12);overflow:hidden;}
.article .cover::before{content:"";position:absolute;width:200px;height:200px;border-radius:50%;top:-110px;right:-50px;background:radial-gradient(circle,rgba(255,59,67,.5),transparent 65%);}
.article .cover .emoji{font-size:34px;position:relative;}
.article .body{padding:15px;}
.article .src{font-size:11px;color:var(--red);font-weight:700;letter-spacing:.03em;}
.article h3{margin-top:7px;color:#fff;} .article .ex{color:var(--muted);font-size:13px;margin-top:7px;line-height:1.5;}
.readmeta{display:flex;gap:8px;margin-top:11px;}
.readmeta .pill{font-size:10.5px;padding:5px 10px;}
.longread h3{margin:20px 0 8px;font-size:19px;color:#fff;}
.longread p{margin-top:12px;font-size:15.5px;line-height:1.65;color:#dcdce2;}
.longread .quote{border-left:2px solid var(--red);padding:8px 0 8px 14px;margin:16px 0;color:#fff;font-style:italic;}
.longread .kicker{background:var(--surface);border:1px solid var(--stroke);border-radius:14px;padding:13px 15px;margin:16px 0;font-size:14px;}
.longread .kicker b{color:var(--red);font-family:var(--fdisp);}

/* map */
.mapwrap{position:relative;border-radius:20px;overflow:hidden;border:1px solid var(--stroke2);background:#0d0d12;box-shadow:var(--shadow);}
.mapwrap svg{display:block;width:100%;height:240px;}
#clubMapEl{width:100%;height:330px;
  background:
    radial-gradient(80% 60% at 18% 30%,rgba(255,59,67,.16),transparent 60%),
    radial-gradient(70% 60% at 85% 80%,rgba(120,120,160,.10),transparent 60%),
    linear-gradient(160deg,#0d0d14,#08080b);
  background-color:#0a0a0f;}
.mapwrap::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:401;
  box-shadow:inset 0 0 60px rgba(255,59,67,.10),inset 0 0 0 1px rgba(255,255,255,.05);border-radius:20px;}
.map-fallback{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  text-align:center;padding:24px;color:var(--muted);font-size:13px;z-index:5;}
.map-fallback .mf-ic{font-size:30px;}
/* затемняем подложку Яндекс.Карты под тёмную тему приложения */
#clubMapEl [class*="ground-pane"]{filter:invert(1) hue-rotate(180deg) brightness(.92) contrast(.96) saturate(.82);}
#clubMapEl [class*="copyrights-pane"]{filter:none;}
/* тёмные балуны в стиле приложения */
[class*="-balloon__layout"]{background:#15151e!important;color:var(--text)!important;border:1px solid var(--stroke2)!important;border-radius:16px!important;box-shadow:0 16px 44px rgba(0,0,0,.6)!important;overflow:hidden!important;}
[class*="-balloon__content"]{background:transparent!important;color:var(--text)!important;font-family:var(--fbody)!important;margin:0!important;padding:13px 15px 14px!important;}
[class*="-balloon-content__header"]{font-family:var(--fdisp)!important;font-weight:800!important;color:#fff!important;margin-bottom:6px!important;font-size:15px!important;}
[class*="-balloon__tail"]{display:none!important;}
[class*="-balloon__close"]{opacity:.85!important;}
[class*="-balloon__close-button-icon"]{filter:invert(1)!important;}
.club-pop .pname{font-family:var(--fdisp);font-weight:800;font-size:15px;color:#fff;margin-bottom:3px;}
.club-pop .ptype{color:var(--red);font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
.club-pop .prow{display:flex;gap:7px;margin-top:5px;color:#cfcfd6;}
.club-pop .prow .ico{flex:0 0 auto;opacity:.7;}
.ypin{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--grad-red);color:#fff;font-family:var(--fdisp);font-weight:800;font-size:13px;box-shadow:0 5px 14px rgba(255,59,67,.6),0 0 0 2px #fff;cursor:pointer;transform:translate(-50%,-50%);}
.ypin.act{box-shadow:0 7px 20px rgba(255,59,67,.95),0 0 0 3px #fff;animation:pinpulse 1.1s ease-in-out infinite;}
@keyframes pinpulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.16)}}

/* ===== running ticker (бегущая строка цитат) ===== */
.ticker{position:relative;overflow:hidden;border-radius:18px;padding:15px 0;border:1px solid var(--stroke);
  background:linear-gradient(120deg,rgba(255,59,67,.16),rgba(255,255,255,.03) 55%,rgba(255,59,67,.10));
  box-shadow:0 12px 34px rgba(0,0,0,.4),inset 0 0 0 1px rgba(255,255,255,.04);}
.ticker::before,.ticker::after{content:"";position:absolute;top:0;bottom:0;width:54px;z-index:2;pointer-events:none;}
.ticker::before{left:0;background:linear-gradient(90deg,#0b0b10,rgba(11,11,16,0));}
.ticker::after{right:0;background:linear-gradient(270deg,#0b0b10,rgba(11,11,16,0));}
.ticker-track{display:inline-flex;align-items:center;white-space:nowrap;will-change:transform;animation:tickerflow 70s linear infinite;}
@keyframes tickerflow{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tk-item{font-family:var(--fdisp);font-weight:800;font-size:16px;letter-spacing:-.01em;color:#fff;padding:0 4px;
  text-shadow:0 2px 14px rgba(0,0,0,.35);}
.tk-dot{display:inline-flex;align-items:center;justify-content:center;color:var(--red);font-size:13px;margin:0 18px;
  text-shadow:0 0 12px var(--redglow);transform:translateY(-1px);}

.pin{cursor:pointer;transition:transform .15s;transform-origin:center bottom;}
.pin:hover,.pin.act{transform:scale(1.3);}
.club{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--stroke);border-radius:16px;padding:14px;margin-top:9px;cursor:pointer;transition:.14s;background:var(--surface);backdrop-filter:blur(8px);}
.club:active{transform:scale(.99);} .club.act{border-color:var(--red);background:rgba(255,59,67,.10);}
.club .no{width:28px;height:28px;border-radius:50%;background:var(--grad-red);color:#fff;font-family:var(--fdisp);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:13px;flex:0 0 auto;box-shadow:0 6px 16px var(--redglow);}
.club .meta{font-size:12px;color:var(--muted);margin-top:2px;} .club b{color:#fff;}

/* deck */
.deck{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-top:10px;}
.suitlabel{font-family:var(--fdisp);font-weight:800;font-size:15px;margin:10px 0 4px;}

/* overlay / sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show{opacity:1;pointer-events:auto;}
.sheet{width:100%;max-width:var(--max);background:linear-gradient(180deg,#16161d,#0c0c11);border:1px solid var(--stroke2);border-bottom:none;border-radius:28px 28px 0 0;padding:6px 18px 28px;transform:translateY(40px);transition:transform .3s cubic-bezier(.2,.8,.2,1);max-height:92vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.6);}
.overlay.show .sheet{transform:none;}
.grab{width:42px;height:5px;border-radius:99px;background:var(--stroke2);margin:8px auto 14px;}
.dots{display:flex;gap:6px;justify-content:center;margin:16px 0;}
.dots i{width:7px;height:7px;border-radius:99px;background:var(--stroke2);transition:.25s;} .dots i.on{background:var(--red);width:22px;box-shadow:0 0 12px var(--redglow);}

.term{color:var(--red);border-bottom:1px dotted var(--red);cursor:pointer;font-weight:700;}
.legal{font-size:11px;color:var(--dim);text-align:center;padding:16px 6px;}
.fade{animation:fade .45s ease;} @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.slidein{animation:slidein .35s ease;} @keyframes slidein{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
label.fld{font-weight:700;font-size:11px;display:block;margin:12px 0 6px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
select{font-family:var(--fbody);font-weight:600;border:1px solid var(--stroke2);border-radius:13px;padding:12px;width:100%;font-size:14px;background:#15151c;color:#fff;}
.segrow{display:flex;gap:6px;flex-wrap:wrap;}
.seg{border:1px solid var(--stroke2);border-radius:12px;padding:9px 13px;font-weight:700;font-size:13px;cursor:pointer;background:var(--surface);color:#fff;transition:.14s;}
.seg:active{transform:scale(.96);} .seg.on{border-color:transparent;background:var(--grad-red);color:#fff;box-shadow:0 6px 16px var(--redglow);}


/* ===== 3D animated raven (no circle) ===== */
.rvn{overflow:visible;display:block;transform-style:preserve-3d;animation:rvnYaw 6.5s ease-in-out infinite;}
@keyframes rvnYaw{0%,100%{transform:perspective(320px) rotateY(-12deg)}50%{transform:perspective(320px) rotateY(12deg)}}
.rvn .body{transform-box:fill-box;transform-origin:50% 62%;animation:rvnFloat 3.4s ease-in-out infinite;}
@keyframes rvnFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-3px) rotate(2deg)}}
.rvn .wing{transform-box:fill-box;transform-origin:60% 36%;animation:rvnWing 2.2s ease-in-out infinite;}
@keyframes rvnWing{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-16deg)}}
.rvn .eye{transform-box:fill-box;transform-origin:center;animation:rvnBlink 4.8s infinite;}
@keyframes rvnBlink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
.rvn .accent{animation:rvnGlow 3s ease-in-out infinite;}
@keyframes rvnGlow{0%,100%{opacity:.8}50%{opacity:1}}

/* ===== interactive coach card (home) ===== */
.coachcard{position:relative;display:flex;align-items:center;gap:14px;padding:18px;border-radius:22px;border:1px solid var(--stroke);background:linear-gradient(150deg,rgba(255,255,255,.08),rgba(255,255,255,.02));overflow:hidden;}
.coachcard::before{content:"";position:absolute;width:220px;height:220px;border-radius:50%;left:-90px;bottom:-120px;background:radial-gradient(circle,rgba(255,59,67,.4),transparent 65%);}
.coachcard .bird{flex:0 0 auto;position:relative;filter:drop-shadow(0 12px 22px rgba(255,59,67,.35));}
.coachcard .say{position:relative;flex:1;min-width:0;}
.coachcard .say .quote{font-family:var(--fdisp);font-weight:800;font-size:18px;line-height:1.22;color:#fff;}
.coachcard .cyc{margin-top:11px;font-size:12px;color:var(--muted);display:inline-flex;gap:7px;align-items:center;cursor:pointer;border:1px solid var(--stroke2);border-radius:99px;padding:7px 13px;background:transparent;transition:.14s;}
.coachcard .cyc:active{transform:scale(.94);} .coachcard .cyc:hover{color:#fff;border-color:var(--red);}
.phrasefade{animation:phraseIn .42s ease;} @keyframes phraseIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

/* ===== analyzer charts ===== */
.chartcard{background:var(--surface);border:1px solid var(--stroke);border-radius:18px;padding:16px;margin-top:12px;}
.eqbar{height:34px;border-radius:11px;background:rgba(255,255,255,.06);position:relative;overflow:hidden;margin-bottom:11px;}
.eqbar>i{position:absolute;left:0;top:0;bottom:0;border-radius:11px;width:0;transition:width 1.05s cubic-bezier(.2,.8,.2,1);}
.eqbar.eq>i{background:var(--grad-red);box-shadow:0 0 18px var(--redglow);} .eqbar.req>i{background:linear-gradient(90deg,#5a5a64,#cfcfd6);}
.eqbar .lab{position:absolute;left:12px;top:0;bottom:0;display:flex;align-items:center;font-size:12px;font-weight:700;color:#fff;z-index:2;}
.eqbar .val{position:absolute;right:12px;top:0;bottom:0;display:flex;align-items:center;font-family:var(--fdisp);font-weight:800;z-index:2;color:#fff;}
.gaugewrap{display:flex;align-items:center;gap:14px;}
.gaugewrap .glabel{font-size:12px;color:var(--muted);} .gaugewrap .gnum{font-family:var(--fdisp);font-weight:800;font-size:26px;color:#fff;}

/* ===== fixes: cards never overlap; ten reads as 10 ===== */
.felt .cardrow{flex-wrap:nowrap;}
.felt .pcard{width:46px;height:66px;} .felt .pcard .r{font-size:13px;left:5px;top:4px;} .felt .pcard .c{font-size:21px;} .felt .pcard .s{font-size:15px;}
.felt .empty-slot{width:46px;height:66px;}
.felt .pcard.sm{width:38px;height:54px;}


.coachcard{cursor:pointer;transition:transform .14s;}
.coachcard:active{transform:scale(.99);}
.coachcard .hint{font-size:11px;color:var(--dim);margin-top:11px;letter-spacing:.01em;}
.coachcard .hint::before{content:"↻  ";color:var(--red);font-weight:700;}
.rvn .body{transform-origin:50% 55%;}

</style>

 'Ауты':{d:'Карты, которые усиливают твою руку до, скорее всего, выигрышной.',ex:'Флеш-дро = 9 аутов.',tip:'Правило 2 и 4: ауты ×2 (одна улица) или ×4 (две улицы).'},

 'C-bet':{d:'Continuation bet — ставка префлоп-агрессора на флопе.',ex:'Маленький c-bet на сухой высокой доске.',tip:'Сайзинг зависит от текстуры доски.'},

// нотация: "22+", "ATs+", "A8o+", "K7s+", "KQs", "JTs", "T9s", "98s", "AKo"
function expandToken(tok,set){
  const pairsAll=()=>{for(let i=12;i>=0;i--)set.add(RANKS[i]+RANKS[i]);};
  if(/^\d\d\+$|^[2-9TJQKA]{2}\+$/.test(tok) && tok[0]===tok[1]){ // pair+
    const from=rv(tok[0]); for(let v=from;v<=14;v++){const r=RANKS[v-2];set.add(r+r);} return;
  }
  if(tok.length===2 && tok[0]===tok[1]){ set.add(tok); return; } // single pair
  const m=tok.match(/^([2-9TJQKA])([2-9TJQKA])(s|o)(\+?)$/);
  if(m){ const hi=m[1],lo=m[2],so=m[3],plus=m[4];
    if(plus){ const hv=rv(hi); for(let v=rv(lo);v<hv;v++){set.add(hi+RANKS[v-2]+so);} }
    else set.add(hi+lo+so);
    return;
  }
}
function buildRange(tokens){ const set=new Set(); tokens.forEach(t=>expandToken(t,set)); return set; }
const OPEN_RANGES={
 UTG:buildRange(['22+','AJs+','KQs','AQo+']),
 MP:buildRange(['22+','ATs+','KJs+','QJs','JTs','AJo+','KQo']),
 CO:buildRange(['22+','A8s+','KTs+','QTs+','JTs','T9s','ATo+','KJo+','QJo']),
 BTN:buildRange(['22+','A2s+','K7s+','Q8s+','J8s+','T8s+','98s','87s','A8o+','KTo+','QTo+','JTo']),
 SB:buildRange(['22+','A2s+','K8s+','Q9s+','J9s+','T9s','A9o+','KTo+','QTo+']),
 BB:buildRange(['22+','A2s+','K5s+','Q7s+','J7s+','T7s+','97s+','86s+','75s+','65s','54s','A2o+','K9o+','Q9o+','J9o+','T9o']),
};
function getOpenRange(pos){ return OPEN_RANGES[pos]||OPEN_RANGES.BTN; }
function handCode(c1,c2){
  let a=c1,b=c2; if(rv(a.r)<rv(b.r)){[a,b]=[b,a];}
  if(a.r===b.r) return a.r+b.r;
  return a.r+b.r+(a.s===b.s?'s':'o');
}
function isHandInRange(c1,c2,pos){ return getOpenRange(pos).has(handCode(c1,c2)); }
// для матрицы 13x13: классификация ячейки
function cellClass(i,j,pos){
  const hi=RANKS[12-Math.min(i,j)], lo=RANKS[12-Math.max(i,j)];
  const code = i===j ? hi+hi : (i<j ? hi+lo+'s' : RANKS[12-i]+RANKS[12-j]+'o');
  // нормализуем: верхняя матрица suited, нижняя offsuit, диагональ пары
  const code2 = i===j? RANKS[12-i]+RANKS[12-i] : (i<j? RANKS[12-i]+RANKS[12-j]+'s' : RANKS[12-j]+RANKS[12-i]+'o');
  const inR=getOpenRange(pos).has(code2);
  const isPair=i===j;
  const premium = isPair && rv(RANKS[12-i])>=12; // QQ+ , also AKs handled below
  if(code2==='AKs'||code2==='AKo') return inR?'premium':'fold';
  if(premium && inR) return 'premium';
  if(inR) return 'open';
  return 'fold';
}
function cellLabel(i,j){ if(i===j)return RANKS[12-i]+RANKS[12-i]; if(i<j)return RANKS[12-i]+RANKS[12-j]+'s'; return RANKS[12-j]+RANKS[12-i]+'o'; }

/* ============================================================================
   6. ДВИЖОК АНАЛИЗА (rule-based) — реально считает, не mock
   ============================================================================ */
function straightOutsRanks(cards){
  const vals=new Set(cards.map(c=>rv(c.r))); if(vals.has(14))vals.add(1);
  const ranks=new Set();
  for(let low=1;low<=10;low++){ const need=[low,low+1,low+2,low+3,low+4];
    const have=need.filter(v=>vals.has(v)).length;
    if(have===4){ const miss=need.find(v=>!vals.has(v)); ranks.add(miss===1?14:miss); } }
  return ranks.size;
}
function bestMade(cards){
  const byRank={},bySuit={}; cards.forEach(c=>{byRank[c.r]=(byRank[c.r]||0)+1;(bySuit[c.s]=bySuit[c.s]||[]).push(rv(c.r));});
  const counts=Object.values(byRank).sort((a,b)=>b-a);
  let flushSuit=null; for(const s in bySuit) if(bySuit[s].length>=5) flushSuit=s;
  const uniq=[...new Set(cards.map(c=>rv(c.r)))]; if(uniq.includes(14))uniq.push(1); uniq.sort((a,b)=>a-b);
  let straightHi=0,run=1; for(let i=1;i<uniq.length;i++){ if(uniq[i]===uniq[i-1]+1){run++; if(run>=5)straightHi=uniq[i];} else run=1; }
  let sf=false; if(flushSuit){ const fv=[...new Set(bySuit[flushSuit])]; if(fv.includes(14))fv.push(1); fv.sort((a,b)=>a-b); let r=1; for(let i=1;i<fv.length;i++){if(fv[i]===fv[i-1]+1){r++;if(r>=5)sf=true;}else r=1;} }
  if(sf) return {cat:'straight_flush',name:'стрит-флеш',score:98};
  if(counts[0]===4) return {cat:'quads',name:'каре',score:96};
  if(counts[0]>=3&&counts[1]>=2) return {cat:'full_house',name:'фулл-хаус',score:92};
  if(flushSuit) return {cat:'flush',name:'флеш',score:88};
  if(straightHi) return {cat:'straight',name:'стрит',score:84};
  if(counts[0]===3) return {cat:'set',name:'сет/трипс',score:78};
  if(counts[0]===2&&counts[1]===2) return {cat:'two_pair',name:'две пары',score:68};
  if(counts[0]===2) return {cat:'pair',name:'пара',score:50};
  return {cat:'high',name:'старшая карта',score:18};
}
function evaluateHand(hero, board){
  const all=hero.concat(board); const made=bestMade(all);
  let madeName=made.name, strength=made.score, cat=made.cat;
  const boardVals=board.map(c=>rv(c.r)); const topBoard=boardVals.length?Math.max(...boardVals):0;
  if(cat==='pair'){
    const cnt={}; all.forEach(c=>cnt[c.r]=(cnt[c.r]||0)+1);
    const pr=Object.keys(cnt).find(r=>cnt[r]===2); const pv=rv(pr);
    const pocket=hero[0].r===hero[1].r;
    if(pocket&&pv>topBoard){madeName='оверпара';cat='overpair';strength=62;}
    else if(pv===topBoard){madeName='топ-пара';cat='top_pair';strength=58;}
    else {madeName='средняя/слабая пара';cat='weak_pair';strength=42;}
  }
  let drawType=null,drawName='',outs=0;
  if(board.length>=3&&board.length<=4&&strength<84){
    const sc={}; all.forEach(c=>sc[c.s]=(sc[c.s]||0)+1);
    const fd=Object.values(sc).some(n=>n===4);
    const sr=straightOutsRanks(all);
    if(fd&&sr>=2){drawType='combo';drawName='комбо-дро (флеш + стрит)';outs=15;}
    else if(fd){drawType='flush';drawName='флеш-дро';outs=9;}
    else if(sr>=2){drawType='oesd';drawName='двустороннее стрит-дро';outs=8;}
    else if(sr>=1){drawType='gut';drawName='гатшот';outs=4;}
    if(drawType&&strength<46) strength=42;
  }
  let desc = (drawType&&(cat==='high'||cat==='weak_pair'))
    ? 'У тебя '+drawName+': '+outs+' аутов.'
    : 'У тебя '+madeName+(drawType?(' + '+drawName):'')+'.';
  return {cat,madeName,drawType,drawName,outs,strength,desc};
}
function analyzeBoard(board){
  const reasons=[]; let danger=0;
  const sc={}; board.forEach(c=>sc[c.s]=(sc[c.s]||0)+1); const maxSuit=Math.max(...Object.values(sc),0);
  const rc={}; board.forEach(c=>rc[c.r]=(rc[c.r]||0)+1); const paired=Object.values(rc).some(n=>n>=2);
  const vals=board.map(c=>rv(c.r)).sort((a,b)=>a-b); const top=vals.length?vals[vals.length-1]:0;
  const span=vals.length?(vals[vals.length-1]-vals[0]):0;
  const connected=board.length>=3&&span<=4&&new Set(vals).size===vals.length;
  if(maxSuit>=3){danger+=45;reasons.push('три карты одной масти — флеши уже возможны');}
  else if(maxSuit===2){danger+=22;reasons.push('две карты одной масти — есть флеш-дро');}
  if(connected){danger+=24;reasons.push('связанные карты — много стрит-дро');}
  if(paired){danger+=14;reasons.push('доска спарена — возможны трипсы и фулл-хаусы');}
  if(vals.length>=3 && (vals[2]-vals[0]<=4) && !connected){danger+=12;reasons.push('карты близко — стриты в игре');}
  if(top>=12)reasons.push('высокая доска — попадает в старшие руки');
  let label;
  if(maxSuit>=3)label='монотонная'; else if(paired)label='спаренная';
  else if(danger>=40)label='мокрая'; else if(danger>=22)label='two-tone, умеренно мокрая'; else label='сухая';
  if(maxSuit===2&&connected)label='мокрая';
  if(!reasons.length)reasons.push('разрозненная радуга — почти нет дро');
  return {texture:label,danger:Math.min(95,danger),reasons,paired,monotone:maxSuit>=3,twoTone:maxSuit===2,connected,top};
}
function calculatePotOdds(pot,bet,call){ const final=pot+bet+call; return {final,required:call>0?Math.round(call/final*100):0}; }
function estimateEquity(h,twoStreets){
  if(h.drawType==='flush')return twoStreets?35:18;
  if(h.drawType==='oesd')return twoStreets?31:16;
  if(h.drawType==='gut')return twoStreets?16:8;
  if(h.drawType==='combo')return twoStreets?54:30;
  const m={straight_flush:98,quads:97,full_house:95,flush:88,straight:85,set:84,two_pair:78,overpair:62,top_pair:58,weak_pair:42,high:22};
  return m[h.cat]??25;
}
function analyzeRangeAdvantage(aggr,caller,board){
  const b=analyzeBoard(board);
  if(b.top>=12&&!b.connected)return{who:aggr,why:'Высокая сухая доска чаще попадает в диапазон префлоп-агрессора — у него больше старших карт.'};
  if(b.top<=9&&b.connected)return{who:caller,why:'Низкая связанная доска лучше ложится на широкий диапазон коллера: мелкие пары и коннекторы.'};
  if(b.top>=12)return{who:aggr,why:'Старшие карты на доске — преимущество чаще у агрессора.'};
  return{who:'примерно равно',why:'Доска не даёт явного перекоса — диапазоны близки.'};
}
function analyzeDecision(ctx){
  const {hero,board,pot,villBet,action,street}=ctx;
  const h=evaluateHand(hero,board); const b=analyzeBoard(board);
  const call=villBet; const po=calculatePotOdds(pot,villBet,call);
  const twoStreets = street==='Флоп';
  const eq=estimateEquity(h,twoStreets);
  let verdict,best,mistake='',mistakeType='',evLoss=0,drill='boardlab',litKey='potodds';
  const wet=b.monotone||b.connected||b.danger>=40;
  const strongMade=['set','two_pair','straight','flush','full_house','quads','straight_flush'].includes(h.cat);

  if((action==='Call')&&h.drawType){
    litKey='potodds';
    if(eq>=po.required){ verdict='Колл нормальный. Эквити '+eq+'% покрывает нужные '+po.required+'%.'+(twoStreets?' Впереди две улицы — цена ещё мягче.':''); best='Колл оправдан. Если на терне ставка вырастет, а дро не зайдёт — будь готов сбросить.'; }
    else { verdict='Колл пограничный/слабый. Нужно '+po.required+'%, а у дро только ~'+eq+'%.'; best=twoStreets?'Колл ближе к норме лишь если впереди две улицы и есть подразумеваемые шансы.':'На одну улицу — фолд лучше: цена выше эквити.'; mistake='Ты нажал call, но эквити дро ниже шансов банка.'; mistakeType='call_no_odds'; evLoss=-Math.round(((po.required-eq)/100)*1.4*100)/100; litKey='potodds'; }
  } else if((action==='All-in'||(action==='Raise'))&&h.cat==='overpair'&&wet){
    verdict='Переоценка одной пары. Оверпара сильна, но '+b.texture+' доска снижает её комфорт.'; best='Контроль банка: чек/колл или небольшая ставка. Олл-ин превращает руку в блеф против лучших.'; mistake='Олл-ин с оверпарой на опасной доске.'; mistakeType='overplay_pair'; evLoss=-1.2; litKey='harr'; drill='boardlab';
  } else if(action==='Fold'&&strongMade&&!wet){
    verdict='Слишком пассивно. На сухой доске такая рука хочет ставить на вэлью.'; best='Ставь/рейзи на вэлью — пассивный фолд теряет деньги.'; mistake='Фолд сильной руки на сухой доске.'; mistakeType='too_passive'; evLoss=-1.0; litKey='cbet'; drill='boardlab';
  } else if(action==='Bet'&&h.cat==='top_pair'&&!wet){
    verdict='Вэлью-бет допустим. Топ-пара на сухой доске хочет ставить тонкое вэлью.'; best='Ставь ~50–66% банка ради вэлью и защиты.'; litKey='cbet'; drill='ranges';
  } else if(action==='Bet'&&wet&&!h.drawType&&h.strength<46){
    verdict='Опасный c-bet без поддержки. На '+b.texture+' доске у тебя нет ни готовой руки, ни дро.'; best='Чаще чек: без эквити ставка только раздувает банк.'; mistake='C-bet на мокрой доске без эквити и дро.'; mistakeType='bad_cbet'; evLoss=-0.8; litKey='cbet'; drill='boardlab';
  } else if(action==='Bet'&&(h.drawType==='flush'||h.drawType==='oesd'||h.drawType==='combo')){
    verdict='Полублеф уместен. У тебя '+h.drawName+': можно выиграть сразу или собрать руку.'; best='Полублеф нормально — складываются фолд-эквити и аутсы.'; litKey='gto'; drill='boardlab';
  } else if(action==='Check'&&strongMade&&!wet){
    verdict='Можно чекнуть, но обычно лучше ставить на вэлью на сухой доске.'; best='Тонкое вэлью предпочтительнее пассивного чека.'; litKey='cbet'; drill='ranges';
  } else if(action==='Fold'&&h.drawType&&eq>=po.required){
    verdict='Возможно, слишком тайтовый фолд: эквити '+eq+'% покрывает цену '+po.required+'%.'; best='С такой ценой колл с дро чаще оправдан.'; mistake='Фолд дро с достаточным эквити.'; mistakeType='overfold'; evLoss=-0.5; litKey='potodds';
  } else if(action==='Call'&&h.cat==='high'&&!h.drawType&&villBet>0){
    verdict='Колл без готовой руки и дро. У тебя только '+h.madeName+' — здесь нечем платить.'; best='Без эквити это фолд: голый колл против ставки минусовый.'; mistake='Колл со старшей картой без дро против ставки.'; mistakeType='call_no_odds'; evLoss=-0.7; litKey='potodds';
  } else if(action==='Fold'&&h.cat==='overpair'&&!wet){
    verdict='Слишком тайтовый фолд: оверпара на '+b.texture+' доске — сильная рука.'; best='Здесь рука хочет ставить на вэлью, а не сбрасываться.'; mistake='Фолд оверпары на сухой доске.'; mistakeType='too_passive'; evLoss=-1.1; litKey='cbet';
  } else if((action==='Bet'||action==='Raise')&&strongMade){
    verdict='Вэлью с '+h.madeName+'. На '+b.texture+' доске ставка/рейз собирает деньги с худших рук.'; best='Ставь на вэлью, подбирая сайзинг под текстуру доски.'; litKey='gto'; drill='ranges';
  } else if(action==='Check'&&h.drawType){
    verdict='Чек с '+h.drawName+' — пассивно, но допустимо для контроля банка.'; best='Часто лучше полублеф: фолд-эквити плюс аутсы дают больше EV.'; litKey='gto'; drill='boardlab';
  } else {
    const actRu={Fold:'Фолд',Check:'Чек',Call:'Колл',Bet:'Ставка',Raise:'Рейз','All-in':'Олл-ин'}[action]||action;
    verdict=actRu+' с '+h.madeName+(board.length?(' на '+b.texture+' доске'):' до флопа')+' — линия в целом разумная.';
    best=(board.length&&b.danger>=40)?'Доска опасная — контролируй банк и не раздувай его без сильной руки.':(board.length?'Доска спокойная — можно действовать увереннее, опираясь на диапазон оппонента.':'До флопа главное — позиция и сила диапазона; играй по позиции.'); litKey=(board.length&&b.danger>=40)?'harr':'gto';
  }
  if(typeof evLoss==='number') evLoss=Math.round(evLoss*100)/100;
  return {h,b,po,eq,verdict,best,mistake,mistakeType,evLoss,drill,litKey,twoStreets};
}

 {emoji:"🛡️",tag:"Теория",min:"4 мин",src:"Мэтью Янда — «Applications of No-Limit Hold’em»",

  ex:"Если ты слишком послушно фолдишь на каждую ставку, любой соперник может блефовать тебя любыми картами — и быть в плюсе.",

   "§ Как считается MDF",
   "MDF — это минимальная доля твоего диапазона, которую нужно продолжать (коллом или рейзом), чтобы блеф соперника не приносил ему автоматическую прибыль. Формула: банк ÷ (банк + ставка).",
   "Против ставки в половину банка MDF ≈ 67%. Против ставки в размер банка ≈ 50%. Против овербета — ещё меньше. Логика простая: чем больше ставит соперник, тем больше он рискует своим блефом, и тем больше рук ты имеешь право сбросить.",

   9. АНИМАЦИИ — числа, карты, фишки, replay
   ============================================================================ */
function animateNumber(el,from,to,duration=700,suffix=''){
  if(!el)return; const t0=performance.now(), d=Math.abs(to-from)<1e-9?0:duration;
  function step(now){ const p=d?Math.min(1,(now-t0)/d):1; const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
    const val=from+(to-from)*e; el.textContent=(Math.round(val*100)/100===Math.round(val)?Math.round(val):(Math.round(val*100)/100))+suffix;
    if(p<1)requestAnimationFrame(step); else el.textContent=(Math.round(to*100)/100)+suffix; }
  requestAnimationFrame(step);
}
function dealCardsSequence(cards,area,opts={}){ // cards: [{r,s}], area: DOM el ; staggered deal
  if(!area)return; area.innerHTML=''; const cls=opts.cls||'';
  cards.forEach((c,i)=>{ setTimeout(()=>{ const d=document.createElement('div');
    d.className='pcard deal '+suitColor(c.s)+' '+cls; d.dataset.idx=i;
    d.innerHTML=`<span class="r">${disp(c.r)}</span><span class="c">${SUIT_CH[c.s]}</span><span class="s">${SUIT_CH[c.s]}</span>`;
    area.appendChild(d); }, i*(opts.gap||160)); });
}
function animateChips(fromEl,toEl,amount,color='r'){ // fly chip discs from->to (Web Animations)
  if(!fromEl||!toEl)return; const f=fromEl.getBoundingClientRect(), to=toEl.getBoundingClientRect();
  const n=Math.max(1,Math.min(6,Math.round(amount/20)));
  for(let i=0;i<n;i++){ const d=document.createElement('div'); d.className='chip fly '+color; d.style.left=(f.left+f.width/2-15)+'px'; d.style.top=(f.top+f.height/2-15)+'px';
    document.body.appendChild(d);
    const dx=(to.left+to.width/2)-(f.left+f.width/2), dy=(to.top+to.height/2)-(f.top+f.height/2);
    d.animate([{transform:'translate(0,0) scale(.6)',opacity:.2},{transform:`translate(${dx*0.5}px,${dy*0.5-18}px) scale(1)`,opacity:1},{transform:`translate(${dx}px,${dy}px) scale(.7)`,opacity:0}],
      {duration:420+i*60,easing:'cubic-bezier(.3,.7,.3,1)',fill:'forwards'});
    setTimeout(()=>d.remove(),520+i*60); }
}
function resetTableAnimation(){ document.querySelectorAll('.chip.fly').forEach(c=>c.remove()); }

const defaultState={
  onboarded:false, goals:[], xp:0, streak:0, accuracy:0, evLoss:0, sessions:0, topMistake:'—',
  dailyDone:0, dailyTotal:5,
  leaks:{call_no_odds:{c:3,ev:-2.1}, overplay_pair:{c:2,ev:-2.4}, bad_cbet:{c:2,ev:-1.6}, wide_open:{c:1,ev:-0.7}},
};
let state=load();
function load(){ try{return Object.assign({},defaultState,JSON.parse(localStorage.getItem('pokercoach_ru'))||{});}catch(e){return Object.assign({},defaultState);} }
function save(){ localStorage.setItem('pokercoach_ru',JSON.stringify(state)); }
function updateLeaks(type,ev){ if(!type)return; if(!state.leaks[type])state.leaks[type]={c:0,ev:0}; state.leaks[type].c++; state.leaks[type].ev=Math.round((state.leaks[type].ev+(ev||0))*100)/100; save(); }
function leakName(id){ const d=LEAK_DEFS.find(x=>x.id===id); return d?d.name:id; }

function raven(size=54){ return `<img class="mascot" src="${MASCOT}" width="${size}" height="${size}" alt="Тренер" style="flex:0 0 auto;display:block;border-radius:50%;object-fit:cover;box-shadow:0 8px 22px rgba(255,59,67,.30), 0 0 0 1px rgba(255,255,255,.12) inset" loading="lazy">`; }
function coach(text,glad){ return `<div class="coach ${glad?'glad':''}">${raven()}<div class="bubble">${text}</div></div>`; }
function disp(r){ return r==='T'?'10':r; }
function cardHTML(c,extra='',deal=true,delay=0){ return `<div class="pcard ${suitColor(c.s)} ${extra} ${deal?'deal':''}" style="animation-delay:${delay}ms"><span class="r">${disp(c.r)}</span><span class="c">${SUIT_CH[c.s]}</span><span class="s">${SUIT_CH[c.s]}</span></div>`; }
function cardsHTML(arr,extra='',startDelay=0,gap=120){ return arr.map((c,i)=>cardHTML(c,extra,true,startDelay+i*gap)).join(''); }
const RAVEN_LINES=['Сегодня тренируем не знания, а решения.','Сначала доска. Потом кнопка.','Ты не проиграешь из-за удачи. Проиграешь из-за математики.','Одна пара — не повод терять стек.','Скучный фолд часто и есть правильный.','Позиция важнее карт. Почти всегда.','Считай ауты, а не надежды.','Хороший игрок думает диапазонами, а не картами.','Не плати за мечту по цене, которая её не стоит.','Тильт — самый дорогой лик в покере.','Маленькая ставка на сухой доске — большая прибыль.','Если не знаешь, зачем ставишь, — чекни.','Блефуй тех, кто умеет фолдить. Остальных — вэлью-бей.','Дисперсия врёт на коротке. Решения — нет.','Терпение оплачивается. Азарт — нет.'];
function ravenLine(){ return RAVEN_LINES[Math.floor(Math.random()*RAVEN_LINES.length)]; }
function coachCard(text){
  const seq=RAVEN_LINES.map(t=>`<span class="tk-item">${t}</span>`).join('<span class="tk-dot">♦</span>');
  const run=seq+'<span class="tk-dot">♦</span>'+seq+'<span class="tk-dot">♦</span>';

let rqz=null;
function randCard(){return {r:RANKS[Math.floor(Math.random()*13)],s:SUITS[Math.floor(Math.random()*4)]};}
function randHand(){ let a=randCard(),b=randCard(); let guard=0; while((a.r===b.r&&a.s===b.s)&&guard++<20)b=randCard(); if(a.r===b.r&&a.s===b.s)b.s=SUITS[(SUITS.indexOf(a.s)+1)%4]; return [a,b]; }
const R_BB_3B=buildRange(['TT+','AQs+','AKo','A5s','A4s']);
const R_BB_CALL=buildRange(['22+','A2s+','K7s+','Q8s+','J8s+','T8s+','97s+','86s+','75s+','65s','54s','A8o+','KTo+','QTo+','JTo']);
function decideBB(h){ const code=handCode(h[0],h[1]); if(R_BB_3B.has(code))return '3'; if(R_BB_CALL.has(code))return 'c'; return 'f'; }
function rqBuild(mode){
  if(mode==='open'){ const list=[]; const ps=['UTG','MP','CO','BTN','SB'];
    for(let i=0;i<20;i++){ const pos=ps[Math.floor(Math.random()*ps.length)], h=randHand(); const inr=isHandInRange(h[0],h[1],pos);
      list.push({pos,hero:h,before:'Все сбросили до тебя',opts:[['Open','o'],['Fold','f']],correct:inr?'o':'f',
        why:inr?(handCode(h[0],h[1])+' входит в open-диапазон '+pos+'.'):(handCode(h[0],h[1])+' вне open-диапазона '+pos+' — фолд.')}); }
    return list;
  }
  if(mode==='3bet'){ const list=[];
    for(let i=0;i<15;i++){ const h=dealHand(); const dec=decide3bet(h); const code=handCode(h[0],h[1]);
      const why={'3':code+' — 3-бет (вэлью или блеф с блокером на туза).','c':code+' — флэт-колл в позиции.','f':code+' — слишком слабо против опена, фолд.'}[dec];
      list.push({pos:'BTN',hero:h,before:'CO open 2.5bb',opts:[['Fold','f'],['Call','c'],['3-bet','3']],correct:dec,why}); }
    return list;
  }
  if(mode==='bb'){ const list=[];
    for(let i=0;i<15;i++){ const h=dealHand(); const dec=decideBB(h); const code=handCode(h[0],h[1]);
      const why={'3':code+' — вэлью/блеф-3бет из BB.','c':code+' — дешёвая защита коллом.','f':code+' — слишком слабо даже для широкой защиты BB.'}[dec];
      list.push({pos:'BB',hero:h,before:'BTN open 2.5bb',opts:[['Fold','f'],['Call','c'],['3-bet','3']],correct:dec,why}); }
    return list;
  }
  if(mode==='adv'){ const list=[]; const aggrs=['UTG','MP','CO','BTN'];
    for(let i=0;i<12;i++){ const {board}=dealBoardHero(3); const aggr=aggrs[Math.floor(Math.random()*aggrs.length)];
      list.push({board,aggr,caller:'BB',before:aggr+' open → BB call'}); }
    return list;
  }
  return [];

   21. RIVER CALL/FOLD TRAINER
   ============================================================================ */
let riverScene=null, riverSeen=new Set();
function shuffleDeck(){ const d=[]; RANKS.forEach(r=>SUITS.forEach(s=>d.push({r,s}))); for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];} return d; }
// «опасность» ривера для одной пары: возможны флеш / стрит / фулл-хаус
function riverScary(board){
  const sc={}; board.forEach(c=>sc[c.s]=(sc[c.s]||0)+1); const flush=Math.max(...Object.values(sc))>=3;
  const rc={}; board.forEach(c=>rc[c.r]=(rc[c.r]||0)+1); const paired=Object.values(rc).some(n=>n>=2);
  const vals=[...new Set(board.map(c=>rv(c.r)))]; if(vals.includes(14))vals.push(1);
  let fourStraight=false; for(let lo=1;lo<=10;lo++){ if([lo,lo+1,lo+2,lo+3,lo+4].filter(v=>vals.includes(v)).length>=4)fourStraight=true; }
  const reasons=[]; if(flush)reasons.push('возможен флеш'); if(fourStraight)reasons.push('возможен стрит'); if(paired)reasons.push('доска спарена');
  return {scary:flush||fourStraight||(paired&&flush), flush, fourStraight, paired, reasons};
}
// rule-based решение для ривера (call/fold) + объяснение
function riverDecision(hero,board,pot,bet){
  const h=evaluateHand(hero,board); const s=riverScary(board);
  const required=calculatePotOdds(pot,bet,bet).required; const mdf=Math.round(pot/(pot+bet)*100);
  const overbet=bet>pot*1.05, big=bet>=pot*0.9;
  const boardVals=board.map(c=>rv(c.r));
  const strong=['set','two_pair','straight','flush','full_house','quads','straight_flush'].includes(h.cat);
  let correct,why,evBad=-0.6;
  if(strong){ correct='c'; why='У тебя '+h.madeName+' — на ривере это вэлью или сильный блеф-кэтчер. Колл (часто можно и рейзить на вэлью).'; }
  else if(h.cat==='overpair'||h.cat==='top_pair'){
    const kick=Math.max(0,...hero.map(c=>rv(c.r)).filter(v=>!boardVals.includes(v)||h.cat==='overpair'));
    const strongKicker=h.cat==='overpair'||kick>=12;
    if(s.scary||overbet){ correct='f'; why='Одна пара ('+h.madeName+') против '+(overbet?'овербета':'опасной доски: '+s.reasons.join(', '))+' — слишком слабый блеф-кэтчер. Фолд.'; evBad=-0.8; }
    else if(strongKicker&&!big){ correct='c'; why=h.madeName+(h.cat==='top_pair'?' с хорошим кикером':'')+' на спокойной доске против умеренной ставки — нормальный блеф-кэтчер. По MDF фолдить всё подряд нельзя.'; }
    else if(!strongKicker&&big){ correct='f'; why='Топ-пара со слабым кикером против крупной ставки — чаще фолд: тебя бьёт лучшее вэлью.'; evBad=-0.7; }
    else { correct='c'; why=h.madeName+' против ставки по цене '+required+'% — колл ловит достаточно блефов.'; }
  }
  else if(h.cat==='weak_pair'){
    if(!s.scary&&bet<=pot*0.55){ correct='c'; why='Средняя/слабая пара, но дёшево и доска спокойная — колл ловит блефы.'; }
    else { correct='f'; why='Слабая пара против заметной ставки'+(s.scary?' на опасной доске':'')+' — обычно фолд.'; evBad=-0.6; }
  }
  else { // старшая карта / несобранное дро
    if(bet<=pot*0.3){ correct='c'; why='Совсем дёшево против мелкой ставки — можно изредка ловить блеф, но это тонко.'; }
    else { correct='f'; why='Нет готовой руки и шоудаун-вэлью против заметной ставки — лёгкий фолд.'; evBad=-0.5; }
  }
  return {h,correct,why,required,mdf,scary:s,evBad,strong};
}
// автогенерация неповторяющегося спота (позиции не повторяются подряд)
function genRiverSpot(){
  for(let attempt=0;attempt<60;attempt++){
    let hpos,vpos; do{ hpos=POSLIST[Math.floor(Math.random()*POSLIST.length)]; vpos=POSLIST[Math.floor(Math.random()*POSLIST.length)]; }while(hpos===vpos);
    if(riverScene&&riverScene.lastPos===hpos+'>'+vpos) continue;       // позиции не повторяются подряд
    const deck=shuffleDeck(); const board=deck.splice(0,5);
    let hero;
    if(Math.random()<0.62){ const tgt=board[Math.floor(Math.random()*5)]; const i=deck.findIndex(c=>c.r===tgt.r);
      const c1=i>=0?deck.splice(i,1)[0]:deck.splice(0,1)[0]; hero=[c1,deck.splice(0,1)[0]]; }
    else hero=deck.splice(0,2);
    const pot=[60,80,100,120,140,160][Math.floor(Math.random()*6)];
    const frac=[0.5,0.66,0.75,1.0,1.3][Math.floor(Math.random()*5)];
    const bet=Math.max(2,Math.round(pot*frac/2)*2);
    const sig=handCode(hero[0],hero[1])+'|'+board.map(c=>c.r+c.s).sort().join('')+'|'+hpos+vpos;
    if(riverSeen.has(sig)) continue;
    riverSeen.add(sig); if(riverSeen.size>400) riverSeen=new Set();
    const d=riverDecision(hero,board,pot,bet);
    return {hero,board,pot,bet,heroPos:hpos,villPos:vpos,...d};
  }
  // запасной вариант
  const deck=shuffleDeck(),board=deck.splice(0,5),hero=deck.splice(0,2),pot=100,bet=66;
  return {hero,board,pot,bet,heroPos:'BTN',villPos:'CO',...riverDecision(hero,board,pot,bet)};
}

function bpPreset(frac,el){ bp.amount=Math.max(1,Math.round(bp.pot*frac)); const inp=document.querySelector('#bpSize input'); if(inp)inp.value=bp.amount; document.getElementById('bpAmt').textContent=bp.amount; document.querySelectorAll('#bpSize .preset').forEach(p=>p.classList.remove('on')); el.classList.add('on'); bpRenderStack(); hp('tap'); }

function bpRenderStack(){ const area=document.getElementById('bpStack'); if(!area)return; const n=Math.max(1,Math.min(8,Math.round(bp.amount/Math.max(1,bp.pot)*4))); area.innerHTML=''; for(let i=0;i<n;i++){const d=document.createElement('div');d.className='chip '+(i%2?'b':'r');d.textContent='';area.appendChild(d);} }
function bpConfirm(){
  if(!bp.action){alert('Выбери действие.');return;} bp.confirmed=true;
  const host=document.getElementById('hodBody'); const heroChips=host.querySelector('#heroChips'), potAmt=host.querySelector('#potAmt');
  let pct = (bp.action==='Bet'||bp.action==='Raise')? bp.amount/bp.pot : (bp.action==='All-in'?99:0);
  // animate chips for any chips-in action
  if(bp.action==='Bet'||bp.action==='Raise'||bp.action==='All-in'){
    const amt=bp.action==='All-in'?bp.stack:bp.amount;
    animateChips(heroChips,potAmt,amt,'r'); animateNumber(potAmt,bp.pot,bp.pot+amt,700);
  }

  let ok=false, ttl, msg, ravenMsg, lit='cbet', mt='';

  else if(bp.action==='Bet'||bp.action==='Raise'){
    if(pct<=0.45){ ok=true; ttl='Отличный сайзинг'; msg='Маленький c-bet ~33% идеально подходит сухой K-7-2: дёшево, часто, с преимуществом диапазона.'; ravenMsg='Маленькая ставка — большая прибыль. Чисто.'; }
    else if(pct<=0.85){ ttl='Великовато'; msg='75% банка на сухой доске — перебор. Тут эффективнее частый мелкий c-bet.'; ravenMsg='Зачем так много на пустой доске?'; mt='bad_cbet'; }
    else { ttl='Слишком много'; msg='Овербет/большая ставка на сухой доске раздувает банк без нужды.'; ravenMsg='Это не та доска, чтобы лить банк.'; mt='bad_cbet'; }
  } else if(bp.action==='All-in'){ ttl='Перебор'; msg='Олл-ин на флопе K-7-2 — потеря ценности: лучшие фолдят, худшие не платят.'; ravenMsg='Олл-ин? С топ-парой на пустой доске?'; mt='overplay_pair'; }

  hp(ok?'ok':'err');
  document.getElementById('bpFb').innerHTML=`<div class="fb ${ok?'ok':'bad'} ${ok?'pulseCorrect':''}" style="margin-top:14px"><div class="ttl">${ok?'✓ ':'⚠ '}${ttl}</div>

    ${ok?'<div class="xp">+10 XP</div>':`<button class="btn btn-soft btn-sm" style="margin-top:8px" onclick="openTutorial('${mt||'bad_cbet'}')">Показать туториал</button>`}</div>
    <div class="sp"></div><label class="fld">Replay раздачи</label><div id="replayHost"></div>`;
  buildReplay();
  document.getElementById('bpFb').scrollIntoView({behavior:'smooth',block:'nearest'});
}

let replayState=null;
function buildReplay(){
  const streets=[
    {label:'Preflop',board:[],pot:6,note:'BTN open 2.5bb, BB call. Hero: A♠Q♠.'},
    {label:'Flop',board:[P('Kc'),P('7d'),P('2s')],pot:6,note:'Сухая высокая доска — преимущество у агрессора.'},
    {label:'Turn',board:[P('Kc'),P('7d'),P('2s'),P('4h')],pot:10,note:'Бланк. Доска по-прежнему сухая.'},
    {label:'River',board:[P('Kc'),P('7d'),P('2s'),P('4h'),P('9c')],pot:18,note:'Дро так и не появилось — вэлью топ-пары растёт.'},
    {label:'Итог',board:[P('Kc'),P('7d'),P('2s'),P('4h'),P('9c')],pot:18,note:'Тонкое вэлью на каждой улице бьёт пассивную линию.'},
  ];

function replayHand(streets){
  replayState={streets,i:0}; const host=document.getElementById('replayHost'); if(!host)return;
  host.innerHTML=`<div class="timeline">${streets.map((s,i)=>`<div class="tl-step ${i===0?'on':''}" onclick="replayGo(${i})">${s.label}</div>`).join('')}</div>

    <button class="btn btn-soft btn-sm" style="margin-top:6px" onclick="replayPlay()">▶ Проиграть заново</button>`;
  replayGo(0);
}
function replayGo(i){
  replayState.i=i; const s=replayState.streets[i];
  document.querySelectorAll('#replayHost .tl-step').forEach((el,k)=>{el.classList.toggle('on',k===i);el.classList.toggle('done',k<i);});
  const stage=document.getElementById('replayStage');
  stage.innerHTML=`<div class="felt" style="margin-top:8px"><div class="seatlabel">${s.label} · банк ${s.pot}</div><div class="cardrow" id="rpBoard"></div></div><div class="sp"></div>${coach(s.note)}`;
  if(s.board.length)dealCardsSequence(s.board,document.getElementById('rpBoard'),{gap:120}); bindTerms();
}
function replayPlay(){ let k=0; const tick=()=>{ if(k>=replayState.streets.length)return; replayGo(k); k++; setTimeout(tick,650); }; tick(); }

function loadYandex(cb){

['ignore_pos','weak_bb','bad_bluff','overfold'].forEach(k=>{ if(!TUT[k])TUT[k]=TUT.call_no_odds; });
let tutS={data:null,i:0};
function openTutorial(type){ const b=TUT[type]||TUT.call_no_odds; tutS={data:b(),i:0}; renderTut(); document.getElementById('overlay').classList.add('show'); }
function renderTut(){ const {data,i}=tutS, s=data.steps[i], last=i===data.steps.length-1;
  document.getElementById('sheet').innerHTML=`<div class="grab"></div><span class="eyebrow">${data.title}</span>
    <div style="margin:14px 0">${s.art||''}</div><h2>${s.h}</h2><p style="margin-top:8px;font-size:15px;line-height:1.55">${s.b}</p>
    <div class="dots">${data.steps.map((_,k)=>`<i class="${k===i?'on':''}"></i>`).join('')}</div>
    <div class="row">${i>0?`<button class="btn btn-soft btn-sm" onclick="tutPrev()">←</button>`:''}<button class="btn btn-red btn-sm" onclick="${last?'closeSheet()':'tutNext()'}">${last?'Понятно':'Дальше'}</button></div>`;
  bindTerms();
}
function tutNext(){ if(tutS.i<tutS.data.steps.length-1){tutS.i++;renderTut();} }
function tutPrev(){ if(tutS.i>0){tutS.i--;renderTut();} }

function openDict(key){ const e=dict[key]; if(!e){return;} hp('tap');
  openSheet(`<div class="grab"></div><span class="eyebrow">Термин</span><h2 style="margin-top:6px">${key}</h2>
    <p style="margin-top:10px;font-weight:600;font-size:15px">${e.d}</p>
    <div class="vblock"><div class="k">Пример</div><div class="v">${e.ex}</div></div>
    <div class="vblock"><div class="k">Подсказка</div><div class="v">${e.tip}</div></div>
    <div class="sp"></div><button class="btn btn-black" onclick="closeSheet()">Закрыть</button>`);
}
function bindTerms(){ document.querySelectorAll('.term').forEach(el=>{ if(el._b)return; el._b=true; const k=el.dataset.term; let tm=null;
  el.addEventListener('click',e=>{e.preventDefault();openDict(k);});
  el.addEventListener('touchstart',()=>{tm=setTimeout(()=>openDict(k),420);},{passive:true});
  el.addEventListener('touchend',()=>clearTimeout(tm)); el.addEventListener('touchmove',()=>clearTimeout(tm)); }); }
function openSheet(html){ document.getElementById('sheet').innerHTML=html; document.getElementById('overlay').classList.add('show'); }
function closeSheet(){ document.getElementById('overlay').classList.remove('show'); }
